<style>
*{box-sizing:border-box;margin:0;padding:0}

.vidbox{aspect-ratio:16/9;background:linear-gradient(135deg,#0e463b,#16a085);border-radius:13px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;gap:8px}

<body><div class="app">
<div class="hd"><h1>🩺 DAY BP · 친절한 안내소</h1><p>혈압 연구를 초등학생도 이해하게 — 소개영상 + 무엇이든 물어보세요</p></div>

<div class="card"><div class="vid">

<video controls preload="metadata" playsinline style="width:100%;border-radius:13px;background:#000;display:block" id="vidbox">

<p style="font-size:12px;color:#7a8699;margin-top:7px">🎬 AI 아바타(dkpark)가 DAY BP 연구를 친절하게 설명해줘요</p>
</div></div>

<div class="card"><div class="chat">
<div class="guide"><div class="gic">📏</div><div><b>반듯이 <span style="font-weight:400;color:#7a8699">· 우리 연구 안내봇</span></b><br><span>궁금한 걸 물어보면 친절하게 답해줄게!</span></div></div>
<div class="msgs" id="msgs"></div>
<div class="chips" id="chips"></div>
<div class="inp"><input id="q" type="text" placeholder="예: 얼마나 정확해? / 암기왕이 뭐야? / 세션은 왜 A가 안 돼?" aria-label="질문"/><button id="send">물어보기</button></div>
</div></div>

</div>
<script>
var KB=[
 {k:["뭐","무엇","소개","이게","이건","연구가","뭔","어떤 연구"],a:"안녕! 이건 <b>DAY BP</b> 연구야. 스마트워치랑 설문지만으로 혈압을 알아맞히는 거야. 손목시계가 알려주는 심박수·걸음·잠 같은 정보로, 하루 종일 혈압이 어떻게 변하는지 분단위로 그려줘! 🩺"},
 {k:["정확","얼마나","잘 맞","성능","점수"],a:"하루 <b>평균</b> 혈압은 아주 잘 맞아 — 병원 기준 <b>BHS A등급</b>이야(일 SBP 2.07·DBP 2.18 mmHg)! 다만 '바로 지금 이 순간' 한 점은 조금 어려워서 <b>B등급</b>이야."},
 {k:["세션","순간","왜 안","a 안","에이 안","올리","높이"],a:"순간 혈압을 A로 올리려면 시계가 주는 요약 숫자(심박수·걸음)만으론 부족해. <b>맥파 모양(raw PPG)</b>, <b>맥파 도착 시간(PTT)</b>, 그리고 <b>자주 보정</b>이 필요해. 센서의 한계지 모형 잘못이 아니야!"},
 {k:["모형","모델","제일","최고","챔피언","반듯","좋은","어떤 모"],a:"챔피언은 바로 나, <b>반듯이(Ridge)</b>야! 📏 꾸준하고 반듯해서 처음 보는 사람한테도 안 흔들려. 이런 친구를 <b>이해왕</b>이라고 불러."},
 {k:["암기왕","과적합","트리","gbm","외우","숲이","부스터","날쌘"],a:"<b>암기왕</b>(숲이·부스터·날쌘이 = 트리·GBM)은 연습문제는 100점인데 진짜 시험은 약해. 연습을 통째로 외워버려서 처음 보는 사람한텐 헷갈려해. 그래서 우린 <b>이해왕</b>을 골랐어!"},
 {k:["정적","동적","static","dynamic","1-step","롤아웃","굴"],a:"<b>정적</b>은 매번 진짜 측정값을 보고 딱 한 걸음만 예측해(아주 정확!). <b>동적</b>은 자기 예측을 믿고 하루를 쭉 굴려(오차가 쌓여). 그래서 정적이 더 정확해."},
 {k:["수준","위상","편차","분해","나누"],a:"혈압을 셋으로 나눠 — <b>수준</b>(그 사람 평소 혈압) + <b>위상</b>(하루 리듬: 낮 높고 새벽 낮음) + <b>편차</b>(운동·스트레스로 잠깐 출렁). 셋을 합치면 분단위 혈압 곡선이 돼!"},
 {k:["어떻게 만","데이터","몇 명","만들","수집"],a:"120명이 7일 동안 하루 약 5번 혈압을 재고, 애플워치 24가지 신호랑 설문을 모았어. 그걸로 모형을 학습시켰지!"},
 {k:["워치","시계","신호","변수","애플"],a:"심박수·심박변이·산소·호흡·활동·걸음·운동강도·손목온도·수면·걸음걸이 등 <b>24가지</b>! 각 신호가 혈압이랑 어떻게 연결되는지 선행연구도 다 찾아 달았어."},
 {k:["목업","대시보드","데모","화면"],a:"환자를 고르면 <b>과거·현재·미래</b> 혈압이 분단위로 나오는 대시보드를 만들었어! 운동·수면부족·스트레스 시나리오도 눌러볼 수 있어. <a href='mockup.html' style='color:#0e7c63;font-weight:700'>보러가기 →</a>"},
 {k:["bhs","등급","평가","mae","어떻게 채점"],a:"<b>BHS</b>는 혈압계 시험 기준이야. 오차가 5/10/15 mmHg 안에 든 비율로 A·B·C를 줘(A는 60/85/95%). 우리는 <b>MAE</b>(평균오차)랑 BHS를 항상 같이 봐."},
 {k:["한계","단점","앞으로","future","다음","숙제"],a:"솔직한 한계 — 순간 혈압은 B야. <b>raw PPG 파형 + PTT 센서 + 자주 보정</b>이 있으면 A로 갈 수 있어. 그게 다음 숙제!"},
 {k:["고마","감사","잘했","멋지","최고야"],a:"헤헤 고마워! 😊 더 궁금한 거 있으면 언제든 물어봐."}
];
var DEF="음~ 그건 내가 잘 모르겠어! 이런 걸 물어봐 👉 '얼마나 정확해?', '암기왕이 뭐야?', '정적이랑 동적 차이', '세션은 왜 A가 안 돼?', '목업 보여줘'";
var CHIPS=["이게 뭐야?","얼마나 정확해?","암기왕이 뭐야?","정적이랑 동적 차이","세션은 왜 A가 안 돼?","목업 보여줘"];
function answer(q){
 var s=q.toLowerCase(),best=null,bn=0;
 KB.forEach(function(e){var n=0;e.k.forEach(function(k){if(s.indexOf(k.toLowerCase())>=0)n+=k.length;});if(n>bn){bn=n;best=e;}});
 return best?best.a:DEF;
}
var M=document.getElementById('msgs');
function push(t,who){var d=document.createElement('div');d.className='m '+who;d.innerHTML=t;M.appendChild(d);M.scrollTop=M.scrollHeight;}
function ask(q){if(!q.trim())return;push(q,'me');setTimeout(function(){push(answer(q),'bot');},220);}
document.getElementById('send').onclick=function(){var q=document.getElementById('q').value;document.getElementById('q').value='';ask(q);};
document.getElementById('q').addEventListener('keydown',function(e){if(e.key==='Enter'){document.getElementById('send').click();}});
var C=document.getElementById('chips');CHIPS.forEach(function(c){var b=document.createElement('button');b.textContent=c;b.onclick=function(){ask(c);};C.appendChild(b);});
push("안녕! 난 <b>반듯이</b>야 📏 DAY BP 연구에 대해 뭐든 물어봐. 아래 버튼을 눌러도 돼!",'bot');
</script></body></html>
